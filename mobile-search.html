<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>CookieDeal — 모바일</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --blue-50:#EBF1FB;--blue-100:#C8D9F5;--blue-200:#9BBBEE;
  --blue-300:#6D9DE7;--blue-400:#3A7ADF;--blue-500:#0549CC;
  --blue-600:#043EB0;--blue-700:#033293;--blue-800:#022777;
  --slate-50:#F7F8FA;--slate-100:#EFF1F5;--slate-200:#E0E4EB;
  --slate-300:#CCD2DB;--slate-400:#9AA3B4;--slate-500:#6B7689;
  --slate-600:#4A5567;--slate-700:#374151;--slate-800:#1F2937;--slate-900:#111827;
  --emerald-50:#ECFDF5;--emerald-500:#10B981;--emerald-600:#059669;
  --red-50:#FEF2F2;--red-500:#EF4444;--red-600:#DC2626;
  --amber-50:#FFFBEB;--amber-500:#F59E0B;
  --purple-50:#F5F3FF;--purple-500:#8B5CF6;
  --teal-50:#F0FDFA;--teal-500:#14B8A6;
  --brand:var(--blue-500);--brand-hover:var(--blue-600);
  --bg:#fff;--text:var(--slate-900);--text-sub:var(--slate-500);--text-muted:var(--slate-400);
  --border:var(--slate-200);--border-light:var(--slate-100);
  --shadow-sm:0 1px 2px rgba(17,24,39,.04);
  --shadow:0 1px 3px rgba(17,24,39,.06),0 1px 2px rgba(17,24,39,.04);
  --radius:8px;--radius-sm:6px;--radius-lg:12px;--radius-xl:16px;
  --transition:.15s cubic-bezier(.4,0,.2,1);
  --m-search-h:44px;
  --m-tab-bar-h:56px;
  --m-safe-bottom:env(safe-area-inset-bottom,0px);
  --m-section-pad:16px;
  --m-chip-h:36px;
  --m-touch-min:44px;
  --m-sheet-radius:20px;
}
html{-webkit-font-smoothing:antialiased}
body{font-family:'Pretendard Variable',Pretendard,-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;font-size:14px;overscroll-behavior:none}

/* ═══ MODE CHIPS (sticky top) ═══ */
.mode-chips{position:sticky;top:0;z-index:200;display:flex;gap:8px;padding:12px var(--m-section-pad) 8px;background:#fff;border-bottom:1px solid var(--border-light)}
.mode-chip{padding:7px 16px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;transition:var(--transition);display:flex;align-items:center;gap:6px;user-select:none}
.mode-chip.active{background:var(--brand);color:#fff}
.mode-chip:not(.active){background:var(--slate-100);color:var(--slate-600)}
.mode-chip:not(.active):active{background:var(--slate-200)}
.mode-chip-badge{font-size:11px;font-weight:700;padding:1px 6px;border-radius:10px;min-width:18px;text-align:center}
.mode-chip.active .mode-chip-badge{background:rgba(255,255,255,.25);color:#fff}
.mode-chip:not(.active) .mode-chip-badge{background:var(--slate-200);color:var(--slate-600)}

/* ═══ VIEW CONTAINERS ═══ */
.view{display:none}
.view.active{display:block}

/* ═══ SEARCH VIEW ═══ */
.search-bar{padding:8px var(--m-section-pad);background:#fff;position:sticky;top:48px;z-index:150}
.search-input-wrap{position:relative}
.search-input{width:100%;height:var(--m-search-h);padding:0 44px 0 16px;border:1px solid var(--border);border-radius:var(--radius-lg);font-size:14px;font-family:inherit;background:var(--slate-50);outline:none;transition:var(--transition)}
.search-input:focus{border-color:var(--brand);background:#fff;box-shadow:0 0 0 3px rgba(5,73,204,.08)}
.search-input::placeholder{color:var(--text-muted)}
.search-icon{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--text-muted)}

/* Filter chips row */
.filter-chips{display:flex;gap:8px;padding:8px var(--m-section-pad) 4px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;background:#fff}
.filter-chips::-webkit-scrollbar{display:none}
.filter-chip{flex-shrink:0;height:var(--m-chip-h);padding:0 14px;border:1px solid var(--border);border-radius:20px;font-size:13px;font-weight:500;color:var(--text-sub);background:#fff;cursor:pointer;display:flex;align-items:center;gap:4px;transition:var(--transition);white-space:nowrap}
.filter-chip:active{background:var(--slate-50)}
.filter-chip.has-value{border-color:var(--brand);color:var(--brand);background:var(--blue-50)}
.filter-chip svg{width:14px;height:14px}

/* Active filter tags */
.active-filters{display:flex;gap:6px;padding:4px var(--m-section-pad) 8px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;background:#fff;flex-wrap:wrap}
.active-filters::-webkit-scrollbar{display:none}
.active-filters:empty{display:none}
.active-tag{flex-shrink:0;padding:4px 10px;border-radius:14px;font-size:12px;font-weight:500;display:flex;align-items:center;gap:4px;cursor:pointer}
.active-tag.include{background:var(--blue-50);color:var(--brand)}
.active-tag.exclude{background:var(--red-50);color:var(--red-600)}
.active-tag.region{background:var(--emerald-50);color:var(--emerald-600)}
.active-tag .tag-x{font-size:14px;font-weight:700;opacity:.6}

/* Result bar */
.result-bar{display:flex;justify-content:space-between;align-items:center;padding:12px var(--m-section-pad) 8px}
.result-count{font-size:13px;color:var(--text-sub)}
.result-count strong{color:var(--brand);font-weight:700}
.result-sort{font-size:13px;color:var(--text-sub);cursor:pointer;display:flex;align-items:center;gap:4px;font-weight:500}
.result-sort:active{color:var(--brand)}

/* Company list — compact rows (synced with desktop search & list view) */
.company-list{padding:0 var(--m-section-pad);padding-bottom:calc(var(--m-tab-bar-h) + var(--m-safe-bottom) + 16px)}
.search-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border-light);cursor:pointer;transition:var(--transition)}
.search-item:active{background:var(--slate-50);margin:0 -16px;padding:12px 16px}
.search-cb{width:20px;height:20px;border:2px solid var(--border);border-radius:5px;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:var(--transition)}
.search-cb.checked{background:var(--brand);border-color:var(--brand)}
.search-cb.checked::after{content:'✓';color:#fff;font-size:12px;font-weight:700}
.search-item-logo{width:40px;height:40px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
.search-item-info{flex:1;min-width:0}
.search-item-name{font-size:15px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.search-item-sub{font-size:12px;color:var(--text-sub);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.search-item-metrics{text-align:right;flex-shrink:0;display:flex;flex-direction:column;gap:1px}
.search-item-metric{display:flex;align-items:baseline;gap:4px;justify-content:flex-end}
.search-item-metric-label{font-size:10px;color:var(--text-muted);font-weight:500}
.search-item-metric-val{font-size:13px;font-weight:700;font-variant-numeric:tabular-nums}
.search-item-metric-change{font-size:10px;font-weight:500}
.search-item-metric-change.up{color:var(--emerald-600)}
.search-item-metric-change.down{color:var(--red-600)}

/* ═══ LIST VIEW ═══ */
.list-header{padding:12px var(--m-section-pad) 0}
.list-name{font-size:18px;font-weight:800;margin-bottom:2px}
.list-desc{font-size:12px;color:var(--text-sub);margin-bottom:8px}
.list-tabs{display:flex;gap:8px;padding:0 var(--m-section-pad);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;margin-bottom:8px}
.list-tabs::-webkit-scrollbar{display:none}
.list-tab{flex-shrink:0;padding:6px 14px;border-radius:16px;font-size:13px;font-weight:500;cursor:pointer;transition:var(--transition);white-space:nowrap;border:1px solid transparent}
.list-tab.active{background:var(--slate-900);color:#fff}
.list-tab:not(.active){background:var(--slate-50);color:var(--text-sub);border-color:var(--border-light)}
.list-tab:not(.active):active{background:var(--slate-100)}
.list-tab-count{font-size:11px;font-weight:700;margin-left:4px;opacity:.7}
.list-controls{display:flex;justify-content:space-between;align-items:center;padding:4px var(--m-section-pad) 8px;font-size:12px;color:var(--text-sub)}
.list-controls-right{display:flex;gap:12px}
.list-ctrl{cursor:pointer;font-weight:500;transition:var(--transition)}
.list-ctrl:active{color:var(--brand)}

/* List items (Toss style) */
.list-items{padding:0 var(--m-section-pad);padding-bottom:calc(var(--m-tab-bar-h) + var(--m-safe-bottom) + 80px)}
.list-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border-light);cursor:pointer;transition:var(--transition)}
.list-item:active{background:var(--slate-50);margin:0 -16px;padding:12px 16px}
.list-item-logo{width:40px;height:40px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
.list-item-info{flex:1;min-width:0}
.list-item-name{font-size:15px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.list-item-sub{font-size:12px;color:var(--text-sub)}
.list-item-right{text-align:right;flex-shrink:0}
.list-item-val{font-size:15px;font-weight:700;font-variant-numeric:tabular-nums}
.list-item-change{font-size:12px;font-weight:500}
.list-item-change.up{color:var(--emerald-600)}
.list-item-change.down{color:var(--red-600)}

/* Checkbox (always visible) */
.list-cb{width:20px;height:20px;border:2px solid var(--border);border-radius:5px;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:var(--transition)}
.list-cb.checked{background:var(--brand);border-color:var(--brand)}
.list-cb.checked::after{content:'✓';color:#fff;font-size:12px;font-weight:700}
.drag-handle{flex-shrink:0;color:var(--text-muted);cursor:grab;font-size:16px;padding:2px;user-select:none;-webkit-user-select:none}
/* Selection action bar (dark, desktop-matching) */
.sel-bar{position:fixed;bottom:calc(var(--m-tab-bar-h) + var(--m-safe-bottom));left:0;right:0;background:var(--slate-900);padding:10px var(--m-section-pad);display:flex;align-items:center;gap:8px;z-index:180;transform:translateY(100%);transition:transform .2s ease}
.sel-bar.show{transform:translateY(0)}
.sel-bar-count{font-size:13px;font-weight:700;color:#fff;flex-shrink:0;padding:4px 12px;border-radius:var(--radius);background:var(--brand)}
.sel-bar-btn{padding:7px 14px;border-radius:var(--radius);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;border:none;background:var(--slate-700);color:#fff;transition:var(--transition);white-space:nowrap}
.sel-bar-btn:active{opacity:.8}
.sel-bar-btn.danger{background:var(--red-600)}
.sel-bar-spacer{flex:1}
/* List item two-metric right column */
.list-item-metrics{text-align:right;flex-shrink:0;display:flex;flex-direction:column;gap:1px}
.list-item-metric{display:flex;align-items:baseline;gap:4px;justify-content:flex-end}
.list-item-metric-label{font-size:10px;color:var(--text-muted);font-weight:500}
.list-item-metric-val{font-size:13px;font-weight:700;font-variant-numeric:tabular-nums}
.list-item-metric-change{font-size:10px;font-weight:500}
.list-item-metric-change.up{color:var(--emerald-600)}
.list-item-metric-change.down{color:var(--red-600)}

/* FAB */
.add-fab{position:fixed;bottom:calc(var(--m-tab-bar-h) + var(--m-safe-bottom) + 16px);right:16px;width:52px;height:52px;border-radius:50%;background:var(--brand);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(5,73,204,.3);cursor:pointer;z-index:160;transition:var(--transition);font-size:24px}
.add-fab:active{transform:scale(.92)}

/* ═══ ADD OVERLAY ═══ */
.add-overlay{position:fixed;inset:0;background:#fff;z-index:300;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);display:flex;flex-direction:column}
.add-overlay.open{transform:translateY(0)}
.add-overlay-header{height:48px;display:flex;align-items:center;padding:0 var(--m-section-pad);border-bottom:1px solid var(--border-light);flex-shrink:0}
.add-overlay-close{width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;color:var(--text-sub);border-radius:50%}
.add-overlay-close:active{background:var(--slate-100)}
.add-overlay-title{font-size:16px;font-weight:700;margin-left:8px}
.add-overlay-search{padding:12px var(--m-section-pad) 8px;flex-shrink:0}
.add-overlay-filters{display:flex;gap:8px;padding:0 var(--m-section-pad) 8px;overflow-x:auto;flex-shrink:0}
.add-overlay-results{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 var(--m-section-pad)}
.add-result-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border-light)}
.add-result-info{flex:1;min-width:0}
.add-result-name{font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.add-result-sub{font-size:12px;color:var(--text-sub)}
.add-btn{padding:6px 14px;border-radius:16px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:var(--transition);flex-shrink:0}
.add-btn.addable{background:var(--blue-50);color:var(--brand)}
.add-btn.addable:active{background:var(--brand);color:#fff}
.add-btn.added{background:var(--slate-100);color:var(--text-muted);cursor:default}
.add-overlay-bottom{height:56px;border-top:1px solid var(--border);display:flex;align-items:center;padding:0 var(--m-section-pad);flex-shrink:0;gap:12px}
.add-selected-count{font-size:13px;font-weight:600;flex:1}
.add-done-btn{padding:10px 24px;border-radius:var(--radius);background:var(--brand);color:#fff;font-size:14px;font-weight:600;border:none;cursor:pointer;font-family:inherit}

/* ═══ BOTTOM SHEET ═══ */
.sheet-overlay{position:fixed;inset:0;background:rgba(17,24,39,.4);z-index:250;opacity:0;pointer-events:none;transition:opacity .2s}
.sheet-overlay.open{opacity:1;pointer-events:auto}
.sheet{position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:var(--m-sheet-radius) var(--m-sheet-radius) 0 0;z-index:260;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);max-height:80vh;display:flex;flex-direction:column}
.sheet.open{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--slate-300);margin:10px auto 6px}
.sheet-header{display:flex;align-items:center;justify-content:space-between;padding:4px var(--m-section-pad) 12px}
.sheet-title{font-size:16px;font-weight:700}
.sheet-reset{font-size:13px;color:var(--brand);cursor:pointer;font-weight:500}
.sheet-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 var(--m-section-pad)}

/* Selected chips in sheet */
.sheet-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;min-height:0}
.sheet-chips:empty{display:none}
.sheet-chip{padding:4px 10px;border-radius:14px;font-size:12px;font-weight:500;display:flex;align-items:center;gap:4px;cursor:pointer}
.sheet-chip.inc{background:var(--blue-50);color:var(--brand)}
.sheet-chip.exc{background:var(--red-50);color:var(--red-600)}

/* Sheet search */
.sheet-search{margin-bottom:12px}
.sheet-search input{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;font-family:inherit;outline:none}
.sheet-search input:focus{border-color:var(--brand)}

/* Accordion tree */
.accordion-item{border-bottom:1px solid var(--border-light)}
.accordion-header{display:flex;align-items:center;padding:10px 0;cursor:pointer;min-height:var(--m-touch-min)}
.accordion-arrow{width:20px;height:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--text-muted);transition:transform .2s;font-size:12px}
.accordion-arrow.open{transform:rotate(90deg)}
.accordion-label{flex:1;font-size:14px;font-weight:500}
.accordion-count{font-size:12px;color:var(--text-muted);margin-right:4px}
/* Per-item IE buttons (like desktop) */
.ie-btns{display:flex;gap:4px;flex-shrink:0;margin-left:4px}
.ie-btn{padding:3px 8px;border-radius:10px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--text-muted);transition:var(--transition);line-height:1.2}
.ie-btn:active{opacity:.7}
.ie-btn.inc-active{background:var(--blue-50);color:var(--brand);border-color:var(--blue-200)}
.ie-btn.exc-active{background:var(--red-50);color:var(--red-600);border-color:#FECACA}
.accordion-children{padding-left:16px;display:none}
.accordion-children.open{display:block}
.accordion-leaf{display:flex;align-items:center;padding:10px 0;cursor:pointer;min-height:var(--m-touch-min);border-bottom:1px solid var(--border-light)}
.accordion-leaf:last-child{border-bottom:none}

/* Range filter */
.range-filter{padding:12px 0}
.range-row{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.range-input{flex:1;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;font-family:inherit;text-align:right;outline:none;transition:var(--transition)}
.range-input:focus{border-color:var(--brand)}
.range-input:disabled{background:var(--slate-100);color:var(--text-muted);cursor:not-allowed}
.range-sep{font-size:13px;color:var(--text-muted)}
.range-unit{font-size:13px;color:var(--text-sub);flex-shrink:0}
.range-presets{display:flex;flex-wrap:wrap;gap:6px}
.range-preset{padding:6px 12px;border:1px solid var(--border);border-radius:16px;font-size:12px;color:var(--text-sub);cursor:pointer;transition:var(--transition)}
.range-preset:active,.range-preset.active{border-color:var(--brand);color:var(--brand);background:var(--blue-50)}

/* Region checklist */
.region-item{display:flex;align-items:center;padding:12px 0;border-bottom:1px solid var(--border-light);cursor:pointer;min-height:var(--m-touch-min)}
.region-item:last-child{border-bottom:none}
.region-name{flex:1;font-size:14px;font-weight:500}
.region-count{font-size:12px;color:var(--text-muted);margin-right:8px}
.region-check{width:22px;height:22px;border:2px solid var(--border);border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:var(--transition)}
.region-check.checked{border-color:var(--brand);background:var(--brand)}
.region-check.checked::after{content:'✓';color:#fff;font-size:13px;font-weight:700}

/* Sort sheet */
.sort-item{padding:14px 0;font-size:15px;font-weight:500;cursor:pointer;border-bottom:1px solid var(--border-light);display:flex;align-items:center;justify-content:space-between}
.sort-item:last-child{border-bottom:none}
.sort-item:active{color:var(--brand)}
.sort-item.active{color:var(--brand);font-weight:700}
.sort-item.active::after{content:'✓';color:var(--brand);font-weight:700}

/* Sheet CTA */
.sheet-cta{padding:12px var(--m-section-pad);border-top:1px solid var(--border-light);flex-shrink:0;padding-bottom:calc(12px + var(--m-safe-bottom))}
.sheet-cta-btn{width:100%;padding:14px;border:none;border-radius:var(--radius-lg);background:var(--brand);color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}

/* ═══ BOTTOM NAV ═══ */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--m-tab-bar-h) + var(--m-safe-bottom));background:#fff;border-top:1px solid var(--border);display:flex;z-index:200;padding-bottom:var(--m-safe-bottom)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;color:var(--slate-400);transition:var(--transition);padding:6px 0}
.nav-item:active{background:var(--slate-50)}
.nav-item.active{color:var(--brand)}
.nav-item svg{width:22px;height:22px}
.nav-label{font-size:10px;font-weight:600}

/* ═══ UTILITY ═══ */
.empty-state{text-align:center;padding:60px 24px;color:var(--text-muted)}
.empty-state-icon{font-size:48px;margin-bottom:12px;opacity:.5}
.empty-state-text{font-size:14px;line-height:1.6}
.hidden{display:none!important}
/* ═══ GROUP EDIT BOTTOM SHEET ═══ */
.group-edit-add{display:flex;align-items:center;gap:10px;padding:14px 16px;color:var(--brand);font-weight:600;font-size:14px;border-bottom:1px solid var(--border-light);cursor:pointer}
.group-edit-add svg{width:20px;height:20px}
.group-edit-item{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border-light)}
.group-edit-del{width:24px;height:24px;border-radius:50%;background:var(--red-500);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;flex-shrink:0}

.group-edit-rename{width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-sub);flex-shrink:0}

.move-sheet-item{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border-light);cursor:pointer}
.move-sheet-item:active{background:var(--slate-50)}
.move-sheet-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.move-sheet-name{font-size:14px;color:var(--text);flex:1}
.move-sheet-current{font-size:12px;color:var(--text-muted)}
/* ═══ DRAG REORDER ═══ */
.list-item.dragging{opacity:.5;background:var(--blue-50)}
.list-item.drag-over{border-top:2px solid var(--brand)}
/* ═══ COMPARE VIEW (list tab) ═══ */
.compare-btn{padding:6px 14px;border:1px solid var(--border);border-radius:var(--radius);background:#fff;color:var(--text-muted);font-size:12px;font-weight:500;cursor:not-allowed;font-family:inherit;display:flex;align-items:center;gap:4px;opacity:.5;transition:var(--transition)}
.compare-btn.active{border-color:var(--brand);background:var(--brand);color:#fff;cursor:pointer;opacity:1}
.compare-panel{display:none;margin:0 var(--m-section-pad) 12px;background:#fff;border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.compare-panel.open{display:block;animation:slideUp .25s ease}
.compare-panel-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border)}
.compare-panel-title{font-size:14px;font-weight:700;color:var(--text)}
.compare-panel-close{width:28px;height:28px;border:none;background:var(--slate-50);border-radius:6px;font-size:16px;color:var(--text-sub);cursor:pointer;display:flex;align-items:center;justify-content:center}
.compare-radar-wrap{padding:16px;display:flex;justify-content:center}
.compare-legend{display:flex;gap:10px;padding:0 16px 12px;flex-wrap:wrap;justify-content:center}

.compare-legend-dot{width:8px;height:8px;border-radius:50%}

function fmtRev(v) {
  if (v===null||v===undefined) return '—';
  if (Math.abs(v) >= 10000) return (v/10000).toFixed(1).replace('.0','')+'조원';
  return v+'억원';
}

function getFilteredCompanies() {
  var q = (document.getElementById('searchInput').value||'').toLowerCase().trim();
  var result = COMPANIES.slice();
  if (q) {
    result = result.filter(function(c){
      return c.name.toLowerCase().indexOf(q)>=0 || c.industry.toLowerCase().indexOf(q)>=0 || c.ceo.toLowerCase().indexOf(q)>=0 || c.bizNo.indexOf(q)>=0;
    });
  }
  if (filterState.region.length) {
    result = result.filter(function(c){
      for (var i=0;i<filterState.region.length;i++){var r=REGION_LIST.find(function(rl){return rl.code===filterState.region[i]});if(r&&c.region.indexOf(r.name)>=0)return true}return false;
    });
  }
  // Product filter (match against company products text)
  if (filterState.product.include.length) {
    result = result.filter(function(c){
      for(var i=0;i<filterState.product.include.length;i++){
        var pn=findProductName(filterState.product.include[i]).toLowerCase();
        if(c.products&&c.products.toLowerCase().indexOf(pn)>=0)return true;
      }return false;
    });
  }
  if (filterState.product.exclude.length) {
    result = result.filter(function(c){
      for(var i=0;i<filterState.product.exclude.length;i++){
        var pn=findProductName(filterState.product.exclude[i]).toLowerCase();
        if(c.products&&c.products.toLowerCase().indexOf(pn)>=0)return false;
      }return true;
    });
  }
  if (filterState.revenue.min!==null) result=result.filter(function(c){return c.revenue>=filterState.revenue.min});
  if (filterState.revenue.max!==null) result=result.filter(function(c){return c.revenue<=filterState.revenue.max});
  // Profit filter with 적자 포함 logic
  if (filterState.profit.includeLoss) {
    // Include all (including negatives), only apply max
    if (filterState.profit.max!==null) result=result.filter(function(c){return c.profit<=filterState.profit.max});
  } else {
    if (filterState.profit.min!==null) result=result.filter(function(c){return c.profit>=filterState.profit.min});
    if (filterState.profit.max!==null) result=result.filter(function(c){return c.profit<=filterState.profit.max});
  }
  // CEO name filter
  if (filterState.ceo) {
    var cq = filterState.ceo.toLowerCase();
    result = result.filter(function(c){return c.ceo && c.ceo.toLowerCase().indexOf(cq)>=0});
  }
  // Sort
  var parts = sortOrder.split('_');
  var key = parts[0], dir = parts[1];
  result.sort(function(a,b){
    var va=key==='name'?a.name:a[key], vb=key==='name'?b.name:b[key];
    if (key==='name') return dir==='asc'?va.localeCompare(vb):vb.localeCompare(va);
    return dir==='asc'?va-vb:vb-va;
  });
  return result;
}

function updateActiveFilters() {
  var html = '';
  filterState.industry.include.forEach(function(code){html+='<div class="active-tag include" onclick="removeIndustry(\'include\',\''+code+'\')">+'+findIndustryName(code)+' <span class="tag-x">×</span></div>'});
  filterState.industry.exclude.forEach(function(code){html+='<div class="active-tag exclude" onclick="removeIndustry(\'exclude\',\''+code+'\')">-'+findIndustryName(code)+' <span class="tag-x">×</span></div>'});
  filterState.product.include.forEach(function(code){html+='<div class="active-tag include" onclick="removeProduct(\'include\',\''+code+'\')">+'+findProductName(code)+' <span class="tag-x">×</span></div>'});
  filterState.product.exclude.forEach(function(code){html+='<div class="active-tag exclude" onclick="removeProduct(\'exclude\',\''+code+'\')">-'+findProductName(code)+' <span class="tag-x">×</span></div>'});
  filterState.region.forEach(function(code){var r=REGION_LIST.find(function(rl){return rl.code===code});if(r)html+='<div class="active-tag region" onclick="removeRegion(\''+code+'\')">'+r.name+' <span class="tag-x">×</span></div>'});
  if (filterState.revenue.min!==null||filterState.revenue.max!==null) {
    var l='매출 ';if(filterState.revenue.min!==null&&filterState.revenue.max!==null)l+=filterState.revenue.min+'~'+filterState.revenue.max+'억';else if(filterState.revenue.min!==null)l+=filterState.revenue.min+'억+';else l+=filterState.revenue.max+'억 이하';
    html+='<div class="active-tag include" onclick="filterState.revenue={min:null,max:null};applyFilters()">'+l+' <span class="tag-x">×</span></div>';
  }
  if (filterState.profit.min!==null||filterState.profit.max!==null||filterState.profit.includeLoss) {
    var l='이익 ';if(filterState.profit.includeLoss)l+='적자 포함';else if(filterState.profit.min!==null&&filterState.profit.max!==null)l+=filterState.profit.min+'~'+filterState.profit.max+'억';else if(filterState.profit.min!==null)l+=filterState.profit.min+'억+';else l+=filterState.profit.max+'억 이하';
    html+='<div class="active-tag include" onclick="filterState.profit={min:null,max:null,includeLoss:false};applyFilters()">'+l+' <span class="tag-x">×</span></div>';
  }
  if (filterState.ceo) {
    html+='<div class="active-tag include" onclick="filterState.ceo=\'\';applyFilters()">대표자: '+filterState.ceo+' <span class="tag-x">×</span></div>';
  }
  document.getElementById('activeFilters').innerHTML = html;
}

function updateFilterChipStyles() {
  var chips=document.querySelectorAll('#filterChips .filter-chip');
  if(chips.length>=6){
    chips[0].classList.toggle('has-value',filterState.industry.include.length>0||filterState.industry.exclude.length>0);
    chips[1].classList.toggle('has-value',filterState.product.include.length>0||filterState.product.exclude.length>0);
    chips[2].classList.toggle('has-value',filterState.region.length>0);
    chips[3].classList.toggle('has-value',filterState.revenue.min!==null||filterState.revenue.max!==null);
    chips[4].classList.toggle('has-value',filterState.profit.min!==null||filterState.profit.max!==null||filterState.profit.includeLoss);
    chips[5].classList.toggle('has-value',!!filterState.ceo);
  }
}

  var overlay=document.getElementById('sheetOverlay'),sheet=document.getElementById('sheet');

  var cta=document.getElementById('sheetCta');
  var reset=document.getElementById('sheetReset');

  // Elevate z-index when opened from add overlay
  overlay.classList.toggle('above-overlay', !!aboveOverlay);
  sheet.classList.toggle('above-overlay', !!aboveOverlay);

  if (type==='sort') {
    title.textContent='정렬';
    reset.style.display='none';
    cta.style.display='none';
    renderSortSheet(body);
  } else {
    reset.style.display='';
    cta.style.display='';
    if (type==='industry'){title.textContent='업종';renderIndustrySheet(body)}
    else if (type==='product'){title.textContent='생산품';renderProductSheet(body)}
    else if (type==='region'){title.textContent='지역';renderRegionSheet(body)}
    else if (type==='revenue'){title.textContent='매출';renderRangeSheet(body,'revenue')}
    else if (type==='profit'){title.textContent='영업이익';renderRangeSheet(body,'profit')}
    else if (type==='ceo'){title.textContent='대표자명';renderCeoSheet(body)}
  }
  overlay.classList.add('open');sheet.classList.add('open');
}

function closeSheet() {
  var overlay=document.getElementById('sheetOverlay'),sheet=document.getElementById('sheet');
  overlay.classList.remove('open','above-overlay');
  sheet.classList.remove('open','above-overlay');
  currentSheet=null;applyFilters();
}

function resetCurrentFilter() {
  if(currentSheet==='industry')filterState.industry={include:[],exclude:[]};
  else if(currentSheet==='product')filterState.product={include:[],exclude:[]};
  else if(currentSheet==='region')filterState.region=[];
  else if(currentSheet==='revenue')filterState.revenue={min:null,max:null};
  else if(currentSheet==='profit')filterState.profit={min:null,max:null,includeLoss:false};
  else if(currentSheet==='ceo')filterState.ceo='';

}

function ieButtonsHtml(code) {
  var isInc = filterState.industry.include.indexOf(code)>=0;
  var isExc = filterState.industry.exclude.indexOf(code)>=0;
  // Check ancestor state
  var ancestorState = getAncestorIeState(code);
  var showInc = true, showExc = true;
  if (ancestorState==='include') showInc = false; // ancestor included → only show exclude
  if (ancestorState==='exclude') showExc = false; // ancestor excluded → only show include
  var html = '<div class="ie-btns" onclick="event.stopPropagation()">';
  if (showInc) html += '<div class="ie-btn'+(isInc?' inc-active':'')+'" onclick="toggleIe(\'include\',\''+code+'\')">포함</div>';
  if (showExc) html += '<div class="ie-btn'+(isExc?' exc-active':'')+'" onclick="toggleIe(\'exclude\',\''+code+'\')">제외</div>';
  html += '</div>';
  return html;
}

function getAncestorIeState(code) {
  var ancestors = findAncestorCodes(code);
  for (var i=ancestors.length-1;i>=0;i--) {
    if (filterState.industry.include.indexOf(ancestors[i])>=0) return 'include';
    if (filterState.industry.exclude.indexOf(ancestors[i])>=0) return 'exclude';
  }
  return null;
}

function findAncestorCodes(targetCode) {
  for (var i=0;i<INDUSTRY_TREE.length;i++) {
    if (INDUSTRY_TREE[i].code===targetCode) return [];
    for (var j=0;j<INDUSTRY_TREE[i].children.length;j++) {
      if (INDUSTRY_TREE[i].children[j].code===targetCode) return [INDUSTRY_TREE[i].code];
      for (var k=0;k<INDUSTRY_TREE[i].children[j].children.length;k++) {
        if (INDUSTRY_TREE[i].children[j].children[k].code===targetCode) return [INDUSTRY_TREE[i].code,INDUSTRY_TREE[i].children[j].code];
      }
    }
  }
  return [];
}

function toggleIe(list, code) {
  var other = list==='include'?'exclude':'include';
  var idx = filterState.industry[list].indexOf(code);
  if (idx>=0) filterState.industry[list].splice(idx,1);
  else {
    filterState.industry[list].push(code);
    var oidx=filterState.industry[other].indexOf(code);
    if(oidx>=0) filterState.industry[other].splice(oidx,1);
  }
  renderIndustrySheet(document.getElementById('sheetBody'));
  applyFilters();
}

function removeIndustry(list,code){var idx=filterState.industry[list].indexOf(code);if(idx>=0)filterState.industry[list].splice(idx,1);renderIndustrySheet(document.getElementById('sheetBody'));applyFilters()}

function findIndustryName(code) {

}

// ─── Range (revenue/profit) ───
function renderRangeSheet(body, type) {
  var state = filterState[type];
  var isProfit = type==='profit';
  var presets = isProfit
    ? [{label:'흑자만',min:1,max:null,loss:false},{label:'10억 이상',min:10,max:null,loss:false},{label:'50억 이상',min:50,max:null,loss:false},{label:'적자 포함',min:null,max:null,loss:true}]
    : [{label:'50억 이상',min:50,max:null},{label:'100~500억',min:100,max:500},{label:'500억 이상',min:500,max:null},{label:'1000억 이상',min:1000,max:null}];

  var minDisabled = isProfit && state.includeLoss;
  var html = '<div class="range-filter"><div class="range-row">' +
    '<input type="number" class="range-input" id="rangeMin" placeholder="최소" value="'+(state.min!==null?state.min:'')+'" onchange="updateRange(\''+type+'\')"'+(minDisabled?' disabled':'')+'>' +
    '<span class="range-sep">~</span>' +
    '<input type="number" class="range-input" id="rangeMax" placeholder="최대" value="'+(state.max!==null?state.max:'')+'" onchange="updateRange(\''+type+'\')">' +
    '<span class="range-unit">억원</span></div><div class="range-presets">';
  presets.forEach(function(p){
    var active;
    if (p.loss) active = state.includeLoss;
    else active = state.min===p.min && state.max===p.max && !state.includeLoss;
    html += '<div class="range-preset'+(active?' active':'')+'" onclick="setRangePreset(\''+type+'\','+JSON.stringify(p.min)+','+JSON.stringify(p.max)+','+(p.loss||false)+')">'+p.label+'</div>';
  });
  html += '</div></div>';
  body.innerHTML = html;
}

function updateRange(type) {
  var min=document.getElementById('rangeMin').value, max=document.getElementById('rangeMax').value;
  filterState[type].min=min!==''?Number(min):null;
  filterState[type].max=max!==''?Number(max):null;
  if (type==='profit') filterState[type].includeLoss=false;
  applyFilters();
}

function setRangePreset(type, min, max, loss) {
  if (loss) {
    filterState[type].min=null;filterState[type].max=null;filterState[type].includeLoss=true;
  } else {
    filterState[type].min=min;filterState[type].max=max;
    if(type==='profit')filterState[type].includeLoss=false;
  }
  renderRangeSheet(document.getElementById('sheetBody'),type);
  applyFilters();
}

// ═══ COMPARISON (리스트 비교) ═══
var compareOpen = false;
var COMPARE_COLORS = ['#0549CC','#10B981','#F59E0B','#DC2626','#8B5CF6','#0D9488','#6366F1'];

function toggleComparison() {
  var count = Object.keys(editChecked).filter(function(k){return editChecked[k]}).length;
  if (count < 2) { alert('비교하려면 2개 이상 선택하세요.'); return; }
  compareOpen = !compareOpen;
  document.getElementById('comparePanel').classList.toggle('open', compareOpen);
  if (compareOpen) drawComparison();
}

function closeComparison() {
  compareOpen = false;
  document.getElementById('comparePanel').classList.remove('open');
}

function drawComparison() {
  var indices = Object.keys(editChecked).filter(function(k){return editChecked[k]}).map(Number).sort(function(a,b){return a-b});
  var comps = indices.map(function(i){
    var name=lists[currentListIdx].companies[i];
    var c=COMPANIES.find(function(co){return co.name===name});
    return c||{name:name,revenue:0,profit:0,revenueG:0,emp:0,industry:'—',color:'#6B7689'};
  });

  // Legend
  document.getElementById('compareLegend').innerHTML = comps.map(function(c,i){
    return '<div class="compare-legend-item"><div class="compare-legend-dot" style="background:'+COMPARE_COLORS[i%COMPARE_COLORS.length]+'"></div>'+c.name+'</div>';
  }).join('');

  // Radar chart
  drawCompareRadar(comps, indices);

  // Metric cards
  var metrics = [
    {label:'매출액',key:'revenue',fmt:function(v){return v+'억'}},
    {label:'영업이익',key:'profit',fmt:function(v){return v+'억'}},
    {label:'이익률',key:null,fmt:function(v,c){return (c.revenue>0?(c.profit/c.revenue*100).toFixed(1):'0')+'%'}},
    {label:'직원수',key:'emp',fmt:function(v){return v+'명'}},
    {label:'성장률',key:'revenueG',fmt:function(v){return (v>0?'+':'')+v+'%'}},
    {label:'설립',key:'year',fmt:function(v){return v+'년'}}
  ];
  document.getElementById('compareMetrics').innerHTML = metrics.map(function(m){
    var html='<div class="compare-metric-card"><div class="compare-mc-label">'+m.label+'</div><div class="compare-mc-values">';
    comps.forEach(function(c,i){
      var val=m.key?c[m.key]:null;
      var display=m.key?m.fmt(val):m.fmt(val,c);
      html+='<div class="compare-mc-val"><div class="compare-mc-dot" style="background:'+COMPARE_COLORS[i%COMPARE_COLORS.length]+'"></div>'+display+'</div>';
    });
    html+='</div></div>';return html;
  }).join('');

  // Comparison table
  var tMetrics = [
    {label:'매출(억)',key:'revenue'},{label:'영업이익(억)',key:'profit'},
    {label:'이익률',key:null,get:function(c){return c.revenue>0?parseFloat((c.profit/c.revenue*100).toFixed(1)):0},fmt:function(v){return v+'%'}},
    {label:'직원수',key:'emp'},{label:'성장률',key:'revenueG',fmt:function(v){return (v>0?'+':'')+v+'%'}},
    {label:'설립',key:'year'}
  ];
  var header='<thead><tr><th>항목</th>'+comps.map(function(c,i){return '<th style="text-align:right;color:'+COMPARE_COLORS[i%COMPARE_COLORS.length]+'">'+c.name.substring(0,6)+'</th>'}).join('')+'</tr></thead>';
  var tbody='<tbody>'+tMetrics.map(function(m){
    var vals=comps.map(function(c){return m.get?m.get(c):(m.key?c[m.key]:0)});
    var best=Math.max.apply(null,vals),worst=Math.min.apply(null,vals);
    var isLowerBetter=m.label==='설립'; // lower year = older = better
    return '<tr><td style="font-weight:600;color:var(--text-sub)">'+m.label+'</td>'+comps.map(function(c,i){
      var val=vals[i],display=m.fmt?m.fmt(val):(val+'');
      var cls='';
      if(isLowerBetter){if(val===worst&&vals.filter(function(v){return v===worst}).length===1)cls='best';if(val===best&&vals.filter(function(v){return v===best}).length===1)cls='worst'}
      else{if(val===best&&vals.filter(function(v){return v===best}).length===1)cls='best';if(val===worst&&vals.filter(function(v){return v===worst}).length===1)cls='worst'}
      return '<td style="text-align:right" class="'+cls+'">'+display+'</td>';
    }).join('')+'</tr>';
  }).join('')+'</tbody>';
  document.getElementById('compareTable').innerHTML=header+tbody;
}

function drawCompareRadar(comps, indices) {
  var canvas=document.getElementById('compareRadar');
  var SIZE=280,dpr=window.devicePixelRatio||1;
  canvas.width=SIZE*dpr;canvas.height=SIZE*dpr;
  canvas.style.width=SIZE+'px';canvas.style.height=SIZE+'px';
  var ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);
  var cx=SIZE/2,cy=SIZE/2,R=100;
  var labels=['매출액','영업이익','직원수','업력','성장률','이익률'];
  var keys=['revenue','profit','emp','year','revenueG',null];
  var maxVals={revenue:900,profit:70,emp:550,year:40,revenueG:25};
  var N=labels.length;

  // Grid
  for(var ring=5;ring>=1;ring--){
    var r=(ring/5)*R;ctx.beginPath();
    for(var j=0;j<=N;j++){var a=(j/N)*Math.PI*2-Math.PI/2;var x=cx+Math.cos(a)*r,y=cy+Math.sin(a)*r;j===0?ctx.moveTo(x,y):ctx.lineTo(x,y)}
    ctx.closePath();
    if(ring===5){ctx.fillStyle='#F7F8FA';ctx.fill()}
    ctx.strokeStyle='#E0E4EB';ctx.lineWidth=0.8;ctx.stroke();
  }
  // Axes + labels
  labels.forEach(function(l,i){
    var a=(i/N)*Math.PI*2-Math.PI/2;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(a)*R,cy+Math.sin(a)*R);
    ctx.strokeStyle='#CCD2DB';ctx.lineWidth=0.5;ctx.stroke();
    var lx=cx+Math.cos(a)*(R+20),ly=cy+Math.sin(a)*(R+20);
    ctx.fillStyle='#374151';ctx.font='bold 10px Pretendard Variable';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(l,lx,ly);
  });
  // Data
  comps.forEach(function(comp,ci){
    var color=COMPARE_COLORS[ci%COMPARE_COLORS.length];
    var data=keys.map(function(k,ki){
      if(k===null)return Math.max(0,Math.min(100,comp.revenue>0?(comp.profit/comp.revenue*100)/10*100:0));
      if(k==='year')return Math.max(0,Math.min(100,((2026-comp[k])/maxVals[k])*100));
      return Math.max(0,Math.min(100,(comp[k]/maxVals[k])*100));
    });
    ctx.beginPath();
    data.forEach(function(v,i){var a=(i/N)*Math.PI*2-Math.PI/2;var r2=(v/100)*R;var x=cx+Math.cos(a)*r2,y=cy+Math.sin(a)*r2;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)});
    ctx.closePath();ctx.fillStyle=color+'25';ctx.fill();
    ctx.strokeStyle=color;ctx.lineWidth=2;ctx.stroke();
    data.forEach(function(v,i){var a=(i/N)*Math.PI*2-Math.PI/2;var r2=(v/100)*R;ctx.beginPath();ctx.arc(cx+Math.cos(a)*r2,cy+Math.sin(a)*r2,3,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke()});
  });
}

// ═══ MOVE TO LIST SHEET ═══
function openMoveSheet() {
  var selected=[];Object.keys(editChecked).forEach(function(k){if(editChecked[k])selected.push(Number(k))});
  if(!selected.length){alert('이동할 기업을 선택해주세요.');return}
  currentSheet='move';
  var overlay=document.getElementById('sheetOverlay'),sheet=document.getElementById('sheet');
  var title=document.getElementById('sheetTitle'),body=document.getElementById('sheetBody');
  document.getElementById('sheetReset').style.display='none';
  document.getElementById('sheetCta').style.display='none';
  title.textContent='이동할 리스트 선택';
  var html='';
  lists.forEach(function(l,i){
    if(i===currentListIdx){html+='<div class="move-sheet-item" style="opacity:.5"><div class="move-sheet-dot" style="background:'+l.color+'"></div><div class="move-sheet-name">'+l.name+'</div><div class="move-sheet-current">현재 리스트</div></div>';return}
    html+='<div class="move-sheet-item" onclick="moveSelectedTo('+i+')"><div class="move-sheet-dot" style="background:'+l.color+'"></div><div class="move-sheet-name">'+l.name+'</div></div>';
  });
  body.innerHTML=html;
  overlay.classList.add('open');sheet.classList.add('open');
}

function moveSelectedTo(targetIdx) {
  var selected=[];Object.keys(editChecked).forEach(function(k){if(editChecked[k])selected.push(Number(k))});
  selected.sort(function(a,b){return b-a});
  var names=[];
  selected.forEach(function(idx){names.push(lists[currentListIdx].companies[idx]);lists[currentListIdx].companies.splice(idx,1)});
  names.forEach(function(name){if(lists[targetIdx].companies.indexOf(name)<0)lists[targetIdx].companies.push(name)});
  editChecked={};closeSheet();renderListView();updateEditCount();
}

// ═══ GROUP EDIT SHEET (Toss 관심 편집 패턴) ═══
function openGroupEditSheet() {
  currentSheet='groupEdit';
  var overlay=document.getElementById('sheetOverlay'),sheet=document.getElementById('sheet');
  var title=document.getElementById('sheetTitle'),body=document.getElementById('sheetBody');
  document.getElementById('sheetReset').style.display='none';
  document.getElementById('sheetCta').style.display='none';
  title.textContent='그룹 편집';
  renderGroupEditContent(body);

}

function renderGroupEditContent(body) {
  if(!body)body=document.getElementById('sheetBody');
  var html='<div class="group-edit-add" onclick="addNewGroup()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>새 그룹 추가</div>';
  lists.forEach(function(l,i){
    html+='<div class="group-edit-item" data-gidx="'+i+'">';
    html+='<div class="group-edit-del" onclick="deleteGroup('+i+')">−</div>';
    html+='<div class="group-edit-name" id="groupName'+i+'">'+l.name+'</div>';
    html+='<div class="group-edit-rename" onclick="renameGroup('+i+')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg></div>';
    html+='<div class="group-edit-drag" ontouchstart="startGroupDrag(event,'+i+')" onmousedown="startGroupDrag(event,'+i+')">⠿</div>';

function addNewGroup() {
  var name=prompt('새 그룹 이름을 입력하세요:');
  if(!name||!name.trim())return;
  var colors=['#0549CC','#D97706','#059669','#8B5CF6','#DC2626','#0D9488','#6366F1'];
  lists.push({name:name.trim(),desc:'',color:colors[lists.length%colors.length],companies:[]});
  renderGroupEditContent();renderListTabs();updateListBadge();
}

function deleteGroup(idx) {
  if(lists.length<=1){alert('최소 1개 그룹은 유지해야 합니다.');return}
  if(!confirm('"'+lists[idx].name+'" 그룹을 삭제하시겠습니까?'))return;
  lists.splice(idx,1);
  if(currentListIdx>=lists.length)currentListIdx=lists.length-1;
  renderGroupEditContent();renderListView();
}

function renameGroup(idx) {
  var el=document.getElementById('groupName'+idx);
  var current=lists[idx].name;
  el.innerHTML='<input type="text" value="'+current+'" onblur="confirmRename('+idx+',this)" onkeydown="if(event.key===\'Enter\')this.blur()" autofocus>';
  el.querySelector('input').focus();
}

function confirmRename(idx,input) {
  var val=input.value.trim();
  if(val)lists[idx].name=val;
  renderGroupEditContent();renderListTabs();
}

// ═══ DRAG REORDER (list items) ═══
var dragIdx=null,dragOverIdx=null;
function startDrag(e,idx){
  e.stopPropagation();
  dragIdx=idx;
  var items=document.querySelectorAll('#listItems .list-item');
  items.forEach(function(el){
    el.addEventListener('touchmove',onDragMove,{passive:false});
    el.addEventListener('touchend',onDragEnd);
    el.addEventListener('mousemove',onDragMove);
    el.addEventListener('mouseup',onDragEnd);
  });
  document.addEventListener('touchmove',onDocDragMove,{passive:false});
  document.addEventListener('touchend',onDocDragEnd);
  document.addEventListener('mousemove',onDocDragMove);
  document.addEventListener('mouseup',onDocDragEnd);
}

function onDragMove(e){e.preventDefault()}
function onDocDragMove(e){
  if(dragIdx===null)return;
  var touch=e.touches?e.touches[0]:e;
  var items=document.querySelectorAll('#listItems .list-item');
  items.forEach(function(el,i){
    var rect=el.getBoundingClientRect();
    if(touch.clientY>=rect.top&&touch.clientY<=rect.bottom){
      dragOverIdx=parseInt(el.getAttribute('data-idx'));
      el.classList.add('drag-over');
    } else {
      el.classList.remove('drag-over');
    }
  });
}

function onDocDragEnd(){
  if(dragIdx!==null&&dragOverIdx!==null&&dragIdx!==dragOverIdx){
    var arr=lists[currentListIdx].companies;
    var item=arr.splice(dragIdx,1)[0];
    arr.splice(dragOverIdx,0,item);
    // Remap editChecked
    var newChecked={};
    Object.keys(editChecked).forEach(function(k){
      var ki=Number(k);
      if(ki===dragIdx)newChecked[dragOverIdx]=editChecked[k];
      else if(dragIdx<dragOverIdx){if(ki>dragIdx&&ki<=dragOverIdx)newChecked[ki-1]=editChecked[k];else newChecked[ki]=editChecked[k]}
      else{if(ki>=dragOverIdx&&ki<dragIdx)newChecked[ki+1]=editChecked[k];else newChecked[ki]=editChecked[k]}
    });
    editChecked=newChecked;
  }
  dragIdx=null;dragOverIdx=null;
  document.removeEventListener('touchmove',onDocDragMove);
  document.removeEventListener('touchend',onDocDragEnd);
  document.removeEventListener('mousemove',onDocDragMove);
  document.removeEventListener('mouseup',onDocDragEnd);
  renderListItems();updateEditCount();
}

function onDragEnd(){onDocDragEnd()}

// ═══ DRAG REORDER (group items) ═══
var groupDragIdx=null,groupDragOverIdx=null;
function startGroupDrag(e,idx){
  e.stopPropagation();
  groupDragIdx=idx;
  document.addEventListener('touchmove',onGroupDragMove,{passive:false});
  document.addEventListener('touchend',onGroupDragEnd);
  document.addEventListener('mousemove',onGroupDragMove);
  document.addEventListener('mouseup',onGroupDragEnd);
}

function onGroupDragMove(e){
  if(groupDragIdx===null)return;
  e.preventDefault();
  var touch=e.touches?e.touches[0]:e;
  var items=document.querySelectorAll('.group-edit-item');
  items.forEach(function(el){
    var rect=el.getBoundingClientRect();
    var gi=parseInt(el.getAttribute('data-gidx'));
    if(touch.clientY>=rect.top&&touch.clientY<=rect.bottom){
      groupDragOverIdx=gi;
      el.style.borderTop='2px solid var(--brand)';
    } else {
      el.style.borderTop='';
    }
  });
}

function onGroupDragEnd(){
  if(groupDragIdx!==null&&groupDragOverIdx!==null&&groupDragIdx!==groupDragOverIdx){
    var item=lists.splice(groupDragIdx,1)[0];
    lists.splice(groupDragOverIdx,0,item);
    if(currentListIdx===groupDragIdx)currentListIdx=groupDragOverIdx;
    else if(groupDragIdx<groupDragOverIdx){if(currentListIdx>groupDragIdx&&currentListIdx<=groupDragOverIdx)currentListIdx--}
    else{if(currentListIdx>=groupDragOverIdx&&currentListIdx<groupDragIdx)currentListIdx++}
  }
  groupDragIdx=null;groupDragOverIdx=null;
  document.removeEventListener('touchmove',onGroupDragMove);
  document.removeEventListener('touchend',onGroupDragEnd);
  document.removeEventListener('mousemove',onGroupDragMove);
  document.removeEventListener('mouseup',onGroupDragEnd);
  renderGroupEditContent();renderListTabs();
}

// ═══ ADD OVERLAY ═══
function openAddOverlay(){addSelected=[];document.getElementById('addSearchInput').value='';document.getElementById('addOverlay').classList.add('open');renderAddResults();setTimeout(function(){document.getElementById('addSearchInput').focus()},300)}
function closeAddOverlay(){document.getElementById('addOverlay').classList.remove('open')}

function renderAddResults() {
  var q=(document.getElementById('addSearchInput').value||'').toLowerCase().trim();
  var results=getFilteredCompanies();
  if(q)results=results.filter(function(c){return c.name.toLowerCase().indexOf(q)>=0||c.industry.toLowerCase().indexOf(q)>=0});
  var current=lists[currentListIdx].companies;
  var html='';
  results.forEach(function(c){
    var alreadyIn=current.indexOf(c.name)>=0,isSel=addSelected.indexOf(c.name)>=0;
    var cls=alreadyIn?'added':(isSel?'added':'addable'),txt=alreadyIn?'추가됨':(isSel?'선택됨':'+추가');
    html+='<div class="add-result-item"><div class="list-item-logo" style="background:'+c.color+';width:36px;height:36px;font-size:13px">'+c.name.charAt(0)+'</div><div class="add-result-info"><div class="add-result-name">'+c.name+'</div><div class="add-result-sub">'+c.industry+' · '+c.region+' · 매출 '+fmtRev(c.revenue)+'</div></div><button class="add-btn '+cls+'" onclick="'+(alreadyIn?'':'toggleAddSelect(\''+c.name+'\')')+'">'+txt+'</button></div>';
  });
  document.getElementById('addResults').innerHTML=html;
  document.getElementById('addSelectedCount').textContent=addSelected.length;
}

function toggleAddSelect(name){var idx=addSelected.indexOf(name);if(idx>=0)addSelected.splice(idx,1);else addSelected.push(name);renderAddResults()}
function confirmAdd(){addSelected.forEach(function(name){if(lists[currentListIdx].companies.indexOf(name)<0)lists[currentListIdx].companies.push(name)});addSelected=[];closeAddOverlay();renderListView()}

function showToast(msg){
  var t=document.getElementById('mToast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(function(){t.classList.remove('show')},2500);
}

  showToast(count+'개 기업이 저장되었습니다');

function bulkFollowMobile(){
  var count=Object.keys(editChecked).filter(function(k){return editChecked[k]}).length;
  if(!count)return;
  showToast(count+'개 기업을 팔로우합니다');
}
function listBulkExportCSV(){
  var indices=[];Object.keys(editChecked).forEach(function(k){if(editChecked[k])indices.push(Number(k))});
  if(!indices.length)return;
  var comps=indices.map(function(i){var name=lists[currentListIdx].companies[i];return COMPANIES.find(function(co){return co.name===name})||{name:name}});
  var header='기업명,업종,지역,매출액,영업이익,직원수';
  var rows=comps.map(function(c){return [c.name,c.industry||'',c.region||'',c.revenue||'',c.profit||'',c.emp||''].join(',')});
  var csv=header+'\n'+rows.join('\n');
  var blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='export_'+lists[currentListIdx].name+'.csv';a.click();
  showToast('CSV 파일이 다운로드되었습니다');
}
